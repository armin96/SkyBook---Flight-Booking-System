<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Flight | SkyBook</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow">
        <div class="container">
            <a class="navbar-brand fw-bold" th:href="@{/}"><i class="bi bi-airplane-fill me-2"></i>SkyBook</a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" th:href="@{/}">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/flights}">Flights</a></li>
                    <li class="nav-item"><a class="nav-link active" th:href="@{/bookings}">Bookings</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/passengers}">Passengers</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container my-4">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <!-- Flight Summary -->
                <div class="card border-0 shadow mb-4">
                    <div class="card-header bg-success text-white">
                        <h5 class="mb-0"><i class="bi bi-airplane me-2"></i>Flight <span th:text="${flight.flightNumber}">BA-001</span></h5>
                    </div>
                    <div class="card-body text-center">
                        <div class="row">
                            <div class="col-5">
                                <h4 th:text="${flight.origin.code}">LHR</h4>
                                <small th:text="${flight.origin.city}">London</small>
                            </div>
                            <div class="col-2 d-flex align-items-center justify-content-center">
                                <i class="bi bi-arrow-right fs-3 text-primary"></i>
                            </div>
                            <div class="col-5">
                                <h4 th:text="${flight.destination.code}">JFK</h4>
                                <small th:text="${flight.destination.city}">New York</small>
                            </div>
                        </div>
                        <hr>
                        <div class="row">
                            <div class="col-4"><strong>Date:</strong><br><span th:text="${#temporals.format(flight.departureTime, 'dd MMM yyyy')}">01 Jan</span></div>
                            <div class="col-4"><strong>Price from:</strong><br><span class="text-success">$<span th:text="${#numbers.formatDecimal(flight.price, 1, 2)}">0.00</span></span></div>
                            <div class="col-4"><strong>Seats left:</strong><br><span th:text="${flight.availableSeats}">0</span></div>
                        </div>
                    </div>
                </div>

                <!-- Booking Form -->
                <div class="card border-0 shadow">
                    <div class="card-header bg-primary text-white">
                        <h5 class="mb-0"><i class="bi bi-bookmark-plus me-2"></i>Book This Flight</h5>
                    </div>
                    <div class="card-body">
                        <form th:action="@{/bookings/save}" method="post">
                            <input type="hidden" name="flightId" th:value="${flight.id}">

                            <div class="mb-3">
                                <label class="form-label">Select Passenger</label>
                                <select name="passengerId" class="form-select" required>
                                    <option value="">Choose passenger...</option>
                                    <option th:each="passenger : ${passengers}" th:value="${passenger.id}" th:text="${passenger.fullName + ' (' + passenger.passportNumber + ')'}"></option>
                                </select>
                                <div class="form-text">
                                    Don't see the passenger? <a th:href="@{/passengers/new}">Register a new passenger</a> first.
                                </div>
                            </div>

                            <div class="mb-4">
                                <label class="form-label">Seat Class</label>
                                <div class="row g-3">
                                    <div class="col-md-4">
                                        <div class="form-check card p-3 text-center">
                                            <input class="form-check-input" type="radio" name="seatClass" value="ECONOMY" id="economy" checked>
                                            <label class="form-check-label d-block" for="economy">
                                                <i class="bi bi-person-fill fs-3 d-block mb-1"></i>
                                                <strong>Economy</strong><br>
                                                <span class="text-success">$<span th:text="${#numbers.formatDecimal(flight.price, 1, 2)}">0.00</span></span>
                                            </label>
                                        </div>
                                    </div>
                                    <div class="col-md-4">
                                        <div class="form-check card p-3 text-center">
                                            <input class="form-check-input" type="radio" name="seatClass" value="BUSINESS" id="business">
                                            <label class="form-check-label d-block" for="business">
                                                <i class="bi bi-briefcase-fill fs-3 d-block mb-1"></i>
                                                <strong>Business</strong><br>
                                                <span class="text-success">$<span th:text="${#numbers.formatDecimal(flight.price * 2.5, 1, 2)}">0.00</span></span>
                                            </label>
                                        </div>
                                    </div>
                                    <div class="col-md-4">
                                        <div class="form-check card p-3 text-center">
                                            <input class="form-check-input" type="radio" name="seatClass" value="FIRST_CLASS" id="first">
                                            <label class="form-check-label d-block" for="first">
                                                <i class="bi bi-star-fill fs-3 d-block mb-1"></i>
                                                <strong>First Class</strong><br>
                                                <span class="text-success">$<span th:text="${#numbers.formatDecimal(flight.price * 4.0, 1, 2)}">0.00</span></span>
                                            </label>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div class="d-flex gap-2">
                                <button type="submit" class="btn btn-success btn-lg"><i class="bi bi-check-lg me-1"></i>Confirm Booking</button>
                                <a th:href="@{/flights/{id}(id=${flight.id})}" class="btn btn-outline-secondary">Cancel</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-dark text-light py-4 mt-5"><div class="container text-center"><p class="mb-1"><i class="bi bi-airplane-fill me-2"></i>SkyBook</p><p class="text-muted small mb-0">&copy; 2026</p></div></footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
