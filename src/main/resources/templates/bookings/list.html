<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookings | SkyBook</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow">
        <div class="container">
            <a class="navbar-brand fw-bold" th:href="@{/}"><i class="bi bi-airplane-fill me-2"></i>SkyBook</a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" th:href="@{/}">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/flights}">Flights</a></li>
                    <li class="nav-item"><a class="nav-link active" th:href="@{/bookings}">Bookings</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/passengers}">Passengers</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-3">
        <div th:if="${success}" class="alert alert-success alert-dismissible fade show"><i class="bi bi-check-circle-fill me-2"></i><span th:text="${success}"></span><button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show"><i class="bi bi-exclamation-triangle-fill me-2"></i><span th:text="${error}"></span><button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>
    </div>

    <main class="container my-4">
        <h2 class="mb-4"><i class="bi bi-journal-check me-2"></i>Bookings</h2>

        <div class="card border-0 shadow-sm">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>Booking ID</th>
                                <th>Passenger</th>
                                <th>Flight</th>
                                <th>Route</th>
                                <th>Class</th>
                                <th>Price</th>
                                <th>Status</th>
                                <th>Date</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="booking : ${bookings}">
                                <td class="fw-bold"><small th:text="${#strings.abbreviate(booking.id, 10)}">ID</small></td>
                                <td th:text="${booking.passenger.fullName}">John Smith</td>
                                <td th:text="${booking.flight.flightNumber}">BA-001</td>
                                <td>
                                    <span th:text="${booking.flight.origin.code}">LHR</span>
                                    <i class="bi bi-arrow-right mx-1"></i>
                                    <span th:text="${booking.flight.destination.code}">JFK</span>
                                </td>
                                <td>
                                    <span class="badge" th:classappend="${booking.seatClass == 'FIRST_CLASS' ? 'bg-warning text-dark' : (booking.seatClass == 'BUSINESS' ? 'bg-info' : 'bg-secondary')}" th:text="${booking.seatClass}">ECONOMY</span>
                                </td>
                                <td>$<span th:text="${#numbers.formatDecimal(booking.totalPrice, 1, 2)}">0.00</span></td>
                                <td>
                                    <span class="badge" th:classappend="${booking.status == 'CONFIRMED' ? 'bg-success' : (booking.status == 'CANCELLED' ? 'bg-danger' : 'bg-secondary')}" th:text="${booking.status}">CONFIRMED</span>
                                </td>
                                <td th:text="${#temporals.format(booking.bookingDate, 'dd MMM yyyy')}">01 Jan</td>
                                <td>
                                    <div class="btn-group btn-group-sm">
                                        <a th:href="@{/bookings/{id}(id=${booking.id})}" class="btn btn-outline-primary" title="View"><i class="bi bi-eye"></i></a>
                                        <a th:href="@{/bookings/{id}/cancel(id=${booking.id})}" class="btn btn-outline-warning" title="Cancel" th:if="${booking.status == 'CONFIRMED'}" onclick="return confirm('Cancel this booking?')"><i class="bi bi-x-lg"></i></a>
                                        <a th:href="@{/bookings/{id}/delete(id=${booking.id})}" class="btn btn-outline-danger" title="Delete" onclick="return confirm('Delete this booking?')"><i class="bi bi-trash"></i></a>
                                    </div>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(bookings)}">
                                <td colspan="9" class="text-center text-muted py-4">No bookings found</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-dark text-light py-4 mt-5"><div class="container text-center"><p class="mb-1"><i class="bi bi-airplane-fill me-2"></i>SkyBook</p><p class="text-muted small mb-0">&copy; 2026</p></div></footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
