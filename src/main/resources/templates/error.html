<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error | SkyBook</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow">
        <div class="container">
            <a class="navbar-brand fw-bold" th:href="@{/}"><i class="bi bi-airplane-fill me-2"></i>SkyBook</a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" th:href="@{/}"><i class="bi bi-house-fill me-1"></i>Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/flights}"><i class="bi bi-airplane me-1"></i>Flights</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/bookings}"><i class="bi bi-journal-check me-1"></i>Bookings</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/passengers}"><i class="bi bi-people-fill me-1"></i>Passengers</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-6 text-center">
                <div class="card border-0 shadow p-5">
                    <i class="bi bi-exclamation-triangle-fill display-1 text-danger mb-3"></i>
                    <h1 class="fw-bold" th:text="${errorCode != null ? errorCode : '500'}">Error</h1>
                    <h3 class="text-muted" th:text="${errorTitle != null ? errorTitle : 'Something went wrong'}">Error</h3>
                    <p class="mt-3" th:text="${errorMessage != null ? errorMessage : 'An unexpected error occurred.'}">Error details</p>
                    <a th:href="@{/}" class="btn btn-primary mt-3"><i class="bi bi-house-fill me-2"></i>Back to Home</a>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-dark text-light py-4 mt-5">
        <div class="container text-center">
            <p class="mb-1"><i class="bi bi-airplane-fill me-2"></i>SkyBook — Flight Booking System</p>
            <p class="text-muted small mb-0">Advanced Programming Project &copy; 2026</p>
        </div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
