<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flights | SkyBook</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow">
        <div class="container">
            <a class="navbar-brand fw-bold" th:href="@{/}"><i class="bi bi-airplane-fill me-2"></i>SkyBook</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"><span class="navbar-toggler-icon"></span></button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" th:href="@{/}"><i class="bi bi-house-fill me-1"></i>Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link active" th:href="@{/flights}"><i class="bi bi-airplane me-1"></i>Flights</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/bookings}"><i class="bi bi-journal-check me-1"></i>Bookings</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/passengers}"><i class="bi bi-people-fill me-1"></i>Passengers</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-3">
        <div th:if="${success}" class="alert alert-success alert-dismissible fade show"><i class="bi bi-check-circle-fill me-2"></i><span th:text="${success}"></span><button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show"><i class="bi bi-exclamation-triangle-fill me-2"></i><span th:text="${error}"></span><button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>
    </div>

    <main class="container my-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="bi bi-airplane me-2"></i>Flights</h2>
            <a th:href="@{/flights/new}" class="btn btn-primary"><i class="bi bi-plus-lg me-1"></i>Add Flight</a>
        </div>

        <!-- Search Form -->
        <div class="card border-0 shadow-sm mb-4">
            <div class="card-body">
                <form th:action="@{/flights}" method="get" class="row g-3 align-items-end">
                    <div class="col-md-4">
                        <label class="form-label">Origin</label>
                        <select name="origin" class="form-select">
                            <option value="">All Origins</option>
                            <option th:each="airport : ${airports}" th:value="${airport.code}" th:text="${airport.code + ' - ' + airport.city}" th:selected="${airport.code == searchOrigin}"></option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Destination</label>
                        <select name="destination" class="form-select">
                            <option value="">All Destinations</option>
                            <option th:each="airport : ${airports}" th:value="${airport.code}" th:text="${airport.code + ' - ' + airport.city}" th:selected="${airport.code == searchDestination}"></option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <button type="submit" class="btn btn-outline-primary w-100"><i class="bi bi-search me-1"></i>Search</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Flights Table -->
        <div class="card border-0 shadow-sm">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>Flight #</th>
                                <th>Route</th>
                                <th>Departure</th>
                                <th>Duration</th>
                                <th>Price</th>
                                <th>Seats</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="flight : ${flights}">
                                <td class="fw-bold" th:text="${flight.flightNumber}">BA-001</td>
                                <td>
                                    <span th:text="${flight.origin.code + ' (' + flight.origin.city + ')'}">LHR</span>
                                    <i class="bi bi-arrow-right mx-1 text-primary"></i>
                                    <span th:text="${flight.destination.code + ' (' + flight.destination.city + ')'}">JFK</span>
                                </td>
                                <td th:text="${#temporals.format(flight.departureTime, 'dd MMM yyyy HH:mm')}">01 Jan</td>
                                <td th:text="${flight.duration}">2h 30m</td>
                                <td>$<span th:text="${#numbers.formatDecimal(flight.price, 1, 2)}">0.00</span></td>
                                <td>
                                    <span class="badge" th:classappend="${flight.availableSeats > 20 ? 'bg-success' : (flight.availableSeats > 0 ? 'bg-warning' : 'bg-danger')}" th:text="${flight.availableSeats}">0</span>
                                </td>
                                <td>
                                    <span class="badge" th:classappend="${flight.status == 'SCHEDULED' ? 'bg-success' : (flight.status == 'CANCELLED' ? 'bg-danger' : 'bg-secondary')}" th:text="${flight.status}">SCHEDULED</span>
                                </td>
                                <td>
                                    <div class="btn-group btn-group-sm">
                                        <a th:href="@{/flights/{id}(id=${flight.id})}" class="btn btn-outline-primary" title="View"><i class="bi bi-eye"></i></a>
                                        <a th:href="@{/flights/{id}/edit(id=${flight.id})}" class="btn btn-outline-warning" title="Edit"><i class="bi bi-pencil"></i></a>
                                        <a th:href="@{/flights/{id}/delete(id=${flight.id})}" class="btn btn-outline-danger" title="Delete" onclick="return confirm('Delete this flight?')"><i class="bi bi-trash"></i></a>
                                    </div>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(flights)}">
                                <td colspan="8" class="text-center text-muted py-4">No flights found</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-dark text-light py-4 mt-5"><div class="container text-center"><p class="mb-1"><i class="bi bi-airplane-fill me-2"></i>SkyBook</p><p class="text-muted small mb-0">&copy; 2026</p></div></footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
